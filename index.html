<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>Lost in the Dessert — Menu</title>
  <style>
    :root{--bg:#fff;--fg:#111;--muted:#6b6b6b;--border:rgba(0,0,0,.08);--shadow:0 12px 34px rgba(0,0,0,.14);--shadow-soft:0 8px 20px rgba(0,0,0,.10)}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--fg)}
    .wrap{min-height:100vh;display:flex;flex-direction:column}
    .viewer{flex:1;display:flex;align-items:center;justify-content:center;padding:max(12px,env(safe-area-inset-top)) 12px max(12px,env(safe-area-inset-bottom));position:relative}
    .frame{width:min(980px,100%);height:calc(100vh - 24px);max-height:940px;border-radius:18px;overflow:hidden;box-shadow:var(--shadow);background:#f7f7f7;position:relative;touch-action:pan-y}
    .slides{height:100%;display:flex;transition:transform 240ms ease}
    .slide{min-width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#fff}
    .slide img{width:100%;height:100%;object-fit:contain;user-select:none;-webkit-user-drag:none}
    .nav{position:absolute;inset:0;display:flex;align-items:center;justify-content:space-between;pointer-events:none;z-index:2}
    .btn{pointer-events:auto;width:44px;height:44px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.9);display:grid;place-items:center;margin:0 10px;box-shadow:var(--shadow-soft);backdrop-filter:blur(8px)}
    .btn svg{width:20px;height:20px}
    .dots{position:absolute;left:0;right:0;bottom:max(12px,env(safe-area-inset-bottom));display:flex;gap:8px;align-items:center;justify-content:center;z-index:3}
    .dot{width:8px;height:8px;border-radius:99px;background:rgba(0,0,0,.22)}
    .dot.active{background:rgba(0,0,0,.65);width:18px}
    .topbar{position:absolute;top:max(12px,env(safe-area-inset-top));left:12px;right:12px;display:flex;align-items:center;justify-content:space-between;gap:10px;z-index:4;pointer-events:none}
    .counter-pill,.cta{pointer-events:auto;display:inline-flex;align-items:center;gap:8px;padding:10px 12px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.92);box-shadow:var(--shadow-soft);backdrop-filter:blur(8px);font-size:12px;font-weight:700;white-space:nowrap}
    .actions{display:flex;gap:10px}
  </style>
</head>
<body>
<div class="wrap"><div class="viewer"><div class="frame" id="frame">
  <div class="topbar">
    <div class="counter-pill"><span id="counter">1 / 5</span><span style="color:var(--muted)">• Swipe</span></div>
    <div class="actions">
      <a class="cta" href="https://wa.me/919962832566?text=Hi%2C%20I%27d%20like%20to%20place%20an%20order%20from%20the%20menu." target="_blank">💬 DM to order</a>
      <a class="cta" href="https://instagram.com/lost.in.the.dessert" target="_blank">📷 Instagram</a>
    </div>
  </div>
  <div class="slides" id="slides">
    <div class="slide"><img src="menu-1.jpg"></div>
    <div class="slide"><img src="menu-2.jpg"></div>
    <div class="slide"><img src="menu-3.jpg"></div>
    <div class="slide"><img src="menu-4.jpg"></div>
    <div class="slide"><img src="menu-5.jpg"></div>
  </div>
  <div class="nav">
    <button class="btn" id="prev">‹</button>
    <button class="btn" id="next">›</button>
  </div>
  <div class="dots" id="dots"></div>
</div></div></div>
<script>
(function(){var s=document.getElementById('slides'),f=document.getElementById('frame'),p=document.getElementById('prev'),n=document.getElementById('next'),c=document.getElementById('counter'),dE=document.getElementById('dots');var t=s.children.length,i=0,d=[];for(var x=0;x<t;x++){var o=document.createElement('div');o.className='dot'+(x===0?' active':'');(function(ii){o.onclick=function(){g(ii)}})(x);dE.appendChild(o);d.push(o)}function g(j){i=Math.max(0,Math.min(t-1,j));s.style.transform='translateX('+(-i*100)+'%)';c.textContent=(i+1)+' / '+t;d.forEach((e,k)=>e.classList.toggle('active',k===i))}p.onclick=()=>g(i-1);n.onclick=()=>g(i+1);g(0)})();
</script>
</body>
</html>
